name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: https://schulerj89.github.io/sigil-breaker/
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check GitHub Pages status
        id: pages-status
        shell: bash
        run: |
          set -euo pipefail

          status="$(
            curl -fsSL https://www.githubstatus.com/api/v2/components.json |
              python3 -c "import json, sys; data = json.load(sys.stdin); print(next((component['status'] for component in data['components'] if component['name'] == 'Pages'), 'unknown'))"
          )"

          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "GitHub Pages status: ${status}"

          if [ "${status}" != "operational" ]; then
            echo "::notice::Skipping Pages deployment because GitHub currently reports Pages as ${status}."
          fi

      - name: Deploy to GitHub Pages
        if: steps.pages-status.outputs.status == 'operational'
        id: deployment
        uses: actions/deploy-pages@v5
