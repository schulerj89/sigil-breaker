name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages --depth=1 || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add pages-dist refs/remotes/origin/gh-pages
          else
            git worktree add --detach pages-dist
            git -C pages-dist checkout --orphan gh-pages
          fi

          find pages-dist -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. pages-dist/
          find pages-dist -name .gitkeep -delete
          touch pages-dist/.nojekyll

          git -C pages-dist add -A

          if git -C pages-dist diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git -C pages-dist commit -m "Deploy ${GITHUB_SHA}"
            git -C pages-dist push origin HEAD:gh-pages
          fi
