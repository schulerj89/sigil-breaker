name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add Pages cache-busting files
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html
          echo "Build files prepared for GitHub Pages cache-busting:"
          ls -la dist

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone --depth=1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/sigil-breaker-pages
          find /tmp/sigil-breaker-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/. /tmp/sigil-breaker-pages/
          cd /tmp/sigil-breaker-pages
          git add -A
          if git diff --cached --quiet; then
            echo "No Pages changes to publish."
          else
            git commit -m "Deploy ${GITHUB_SHA}"
            git push origin gh-pages
          fi

      - name: Request Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
